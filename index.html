<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Tree Explorer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0d1b2a;
  color: #e8e0d5;
  font-family: Georgia, 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}

/* ── Loading screen ── */
#loading {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0d1b2a;
  z-index: 999;
  gap: 18px;
}
#loading h2 { color: #d4af50; font-size: 22px; font-weight: normal; letter-spacing: 3px; }
#loading p  { color: rgba(255,255,255,0.45); font-size: 13px; }
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(212,175,80,0.2);
  border-top-color: #d4af50;
  border-radius: 50%;
  animation: spin 0.9s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Header ── */
#header {
  position: fixed; top: 0; left: 0; right: 0; height: 58px;
  background: rgba(10,18,30,0.97);
  border-bottom: 1px solid rgba(212,175,80,0.25);
  display: flex; align-items: center; padding: 0 20px;
  z-index: 100; gap: 18px;
}
#header h1 {
  font-size: 17px; color: #d4af50;
  letter-spacing: 3px; font-weight: normal;
  text-transform: uppercase; white-space: nowrap;
}
#search-wrap { position: relative; }
#search-wrap::before {
  content: '⌕'; position: absolute; left: 10px; top: 50%;
  transform: translateY(-50%); color: rgba(212,175,80,0.5);
  font-size: 15px; pointer-events: none;
}
#search-box {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(212,175,80,0.25); border-radius: 20px;
  padding: 6px 14px 6px 30px; color: #e8e0d5; font-size: 13px;
  width: 220px; outline: none; font-family: inherit;
}
#search-box::placeholder { color: rgba(255,255,255,0.35); }
#search-box:focus { border-color: rgba(212,175,80,0.6); background: rgba(255,255,255,0.09); }

#stats { display: flex; gap: 20px; margin-left: auto; }
.stat { text-align: center; line-height: 1.3; }
.stat-val { font-size: 17px; color: #d4af50; font-weight: bold; }
.stat-lbl { font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 1px; }

/* ── Controls ── */
#controls {
  position: fixed; bottom: 20px; left: 20px;
  display: flex; flex-direction: column; gap: 6px; z-index: 100;
}
.ctrl-btn {
  background: rgba(10,18,30,0.92); border: 1px solid rgba(212,175,80,0.25);
  color: #d4d4d4; padding: 7px 13px; cursor: pointer; border-radius: 6px;
  font-size: 12px; font-family: inherit; transition: all 0.2s; text-align: left;
}
.ctrl-btn:hover { background: rgba(212,175,80,0.15); border-color: #d4af50; color: #fff; }

/* ── Legend ── */
#legend {
  position: fixed; bottom: 20px; right: 20px;
  background: rgba(10,18,30,0.93); border: 1px solid rgba(212,175,80,0.2);
  border-radius: 8px; padding: 12px 15px; z-index: 100;
  max-height: 280px; overflow-y: auto; min-width: 160px;
}
#legend::-webkit-scrollbar { width: 4px; }
#legend::-webkit-scrollbar-thumb { background: rgba(212,175,80,0.3); border-radius: 2px; }
#legend h3 {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
  color: rgba(212,175,80,0.6); margin-bottom: 9px; font-weight: normal;
}
.legend-item {
  display: flex; align-items: center; gap: 8px; margin-bottom: 6px;
  font-size: 12px; cursor: pointer; padding: 2px 4px; border-radius: 4px;
  transition: background 0.15s;
}
.legend-item:hover { background: rgba(255,255,255,0.06); }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.legend-count { color: rgba(255,255,255,0.4); font-size: 10px; margin-left: auto; }

/* ── Detail panel ── */
#detail-panel {
  position: fixed; top: 58px; right: -320px; width: 300px;
  height: calc(100vh - 58px); background: rgba(10,18,30,0.98);
  border-left: 1px solid rgba(212,175,80,0.2); padding: 20px 18px;
  z-index: 100; overflow-y: auto;
  transition: right 0.3s cubic-bezier(0.25,0.46,0.45,0.94);
}
#detail-panel::-webkit-scrollbar { width: 4px; }
#detail-panel::-webkit-scrollbar-thumb { background: rgba(212,175,80,0.3); border-radius: 2px; }
#detail-panel.open { right: 0; }
#detail-panel h2 { font-size: 18px; color: #d4af50; margin-bottom: 2px; line-height: 1.3; }
#detail-panel .dsurname { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 14px; }
.deceased-badge {
  display: inline-block; font-size: 10px; color: rgba(255,120,100,0.85);
  border: 1px solid rgba(255,120,100,0.4); padding: 2px 7px; border-radius: 10px; margin-bottom: 14px;
}
.root-badge {
  display: inline-block; font-size: 10px; color: #d4af50;
  border: 1px solid rgba(212,175,80,0.5); padding: 2px 7px; border-radius: 10px; margin-bottom: 8px;
}
.detail-section { margin-bottom: 14px; border-top: 1px solid rgba(255,255,255,0.07); padding-top: 11px; }
.detail-section h3 {
  font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px;
  color: rgba(212,175,80,0.55); margin-bottom: 7px; font-weight: normal;
}
.detail-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 12px; gap: 8px; }
.detail-label { color: rgba(255,255,255,0.45); white-space: nowrap; }
.detail-value { color: #e0d8cc; text-align: right; }
.person-link {
  color: #7dd3fc; cursor: pointer; text-decoration: none;
  display: block; margin-bottom: 4px; font-size: 12px; padding: 2px 0; transition: color 0.15s;
}
.person-link:hover { color: #d4af50; }
#close-detail {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; color: rgba(255,255,255,0.4);
  font-size: 16px; cursor: pointer; line-height: 1; transition: color 0.15s;
}
#close-detail:hover { color: #d4af50; }

#hint {
  position: fixed; top: 72px; left: 50%; transform: translateX(-50%);
  background: rgba(212,175,80,0.12); border: 1px solid rgba(212,175,80,0.35);
  border-radius: 20px; padding: 7px 18px; font-size: 11px;
  color: rgba(255,255,255,0.65); z-index: 50; pointer-events: none;
  transition: opacity 1s; white-space: nowrap;
}

svg {
  position: fixed; top: 58px; left: 0;
  width: 100vw; height: calc(100vh - 58px);
}
.link { fill: none; }
.link-parent  { stroke: rgba(255,255,255,0.18); stroke-width: 1.5; }
.link-partner { stroke: rgba(212,175,80,0.45); stroke-width: 1.5; stroke-dasharray: 5,3; }

.node circle { cursor: pointer; transition: filter 0.2s; }
.node text { font-size: 8.5px; fill: rgba(255,255,255,0.72); pointer-events: none; text-anchor: middle; }
.node.highlighted circle { filter: drop-shadow(0 0 7px currentColor); }
.node.dimmed circle { opacity: 0.12; }
.node.dimmed text  { opacity: 0.1; }

.tooltip {
  position: fixed; background: rgba(10,18,30,0.96);
  border: 1px solid rgba(212,175,80,0.4); border-radius: 6px;
  padding: 7px 12px; font-size: 12px; pointer-events: none;
  z-index: 200; opacity: 0; transition: opacity 0.15s;
  max-width: 200px; line-height: 1.5;
}
</style>
</head>
<body>

<!-- Loading screen -->
<div id="loading">
  <div class="spinner"></div>
  <h2>✦ Family Tree</h2>
  <p>Loading family data…</p>
</div>

<div id="header" style="display:none">
  <h1>✦ Family Tree</h1>
  <div id="search-wrap">
    <input type="text" id="search-box" placeholder="Search by name…" autocomplete="off" />
  </div>
  <div id="stats">
    <div class="stat"><div class="stat-val" id="s-total">—</div><div class="stat-lbl">People</div></div>
    <div class="stat"><div class="stat-val" id="s-dec">—</div><div class="stat-lbl">Deceased</div></div>
    <div class="stat"><div class="stat-val" id="s-oldest">—</div><div class="stat-lbl">Oldest yr</div></div>
    <div class="stat"><div class="stat-val" id="s-sur">—</div><div class="stat-lbl">Surnames</div></div>
  </div>
</div>

<div id="hint" style="display:none">Click a person to see their details · Scroll to zoom · Drag to pan</div>

<div id="detail-panel">
  <button id="close-detail" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<div id="legend" style="display:none">
  <h3>Family Branches</h3>
  <div id="legend-items"></div>
</div>

<div id="controls" style="display:none">
  <button class="ctrl-btn" onclick="resetView()">⊙ Reset View</button>
  <button class="ctrl-btn" id="btn-dec" onclick="toggleDeceased()">◌ Hide Deceased</button>
  <button class="ctrl-btn" onclick="clearHighlight()">✕ Clear Highlight</button>
</div>

<div class="tooltip" id="tooltip"></div>
<svg id="svg-main"></svg>

<script>
// ─── CONFIG ─────────────────────────────────────────────────────────────────
// This is the only line you ever need to change if you move the CSV somewhere else
const CSV_URL = './family.csv';

// ─── CSV PARSER ──────────────────────────────────────────────────────────────
function parseCSVLine(line) {
  // Handles quoted fields with embedded commas
  const result = [];
  let cur = '', inQ = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += c; }
  }
  result.push(cur);
  return result;
}

function parseCSV(text) {
  const lines = text.trim().split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  const headers = parseCSVLine(lines[0]).map(h => h.trim());
  const COL = {};
  headers.forEach((h, i) => COL[h] = i);

  // Helper — safe column read
  const g = (v, col) => (v[COL[col]] || '').trim();

  return lines.slice(1).map(line => {
    const v = parseCSVLine(line);
    const exStr    = g(v, 'Ex-partner IDs');
    const extraStr = g(v, 'Extra partner IDs');
    return {
      id:             g(v, 'ID'),
      name:           g(v, 'Full name'),
      surname:        g(v, 'Surname now') || g(v, 'Surname at birth'),
      gender:         g(v, 'Gender'),
      deceased:       g(v, 'Deceased') === 'Y',
      motherId:       g(v, 'Mother ID'),
      fatherId:       g(v, 'Father ID'),
      partnerId:      g(v, 'Partner ID'),
      exPartnerIds:   exStr    ? exStr.split(' ').filter(x=>x)    : [],
      extraPartnerIds:extraStr ? extraStr.split(' ').filter(x=>x) : [],
      birthYear:      g(v, 'Birth year')  ? +g(v, 'Birth year')  : null,
      birthMonth:     g(v, 'Birth month') ? +g(v, 'Birth month') : null,
      birthDay:       g(v, 'Birth day')   ? +g(v, 'Birth day')   : null,
      deathYear:      g(v, 'Death year')  ? +g(v, 'Death year')  : null,
      birthPlace:     g(v, 'Birth place'),
      deathPlace:     g(v, 'Death place'),
      profession:     g(v, 'Profession'),
      bioNotes:       g(v, 'Bio notes'),
    };
  }).filter(p => p.id);
}

// ─── LOAD & INIT ─────────────────────────────────────────────────────────────
async function init() {
  let csvText;
  try {
    const resp = await fetch(CSV_URL);
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    csvText = await resp.text();
  } catch (err) {
    document.getElementById('loading').innerHTML = `
      <div style="text-align:center;max-width:420px;padding:20px">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <h2 style="color:#f87171;font-size:16px;margin-bottom:10px">Could not load family.csv</h2>
        <p style="color:rgba(255,255,255,0.5);font-size:13px;line-height:1.6">
          Make sure <strong style="color:#d4af50">family.csv</strong> is in the same folder as this HTML file.<br><br>
          If you're opening this file locally (not from a server), use a local server or upload both files to GitHub Pages.
        </p>
        <p style="color:rgba(255,255,255,0.3);font-size:11px;margin-top:12px">${err.message}</p>
      </div>`;
    return;
  }

  const people = parseCSV(csvText);
  if (!people.length) {
    document.getElementById('loading').innerHTML = '<p style="color:#f87171">CSV loaded but no data found. Check the file format.</p>';
    return;
  }

  buildTree(people);

  // Show UI
  document.getElementById('loading').style.display = 'none';
  document.getElementById('header').style.display = 'flex';
  document.getElementById('hint').style.display = 'block';
  document.getElementById('legend').style.display = 'block';
  document.getElementById('controls').style.display = 'flex';

  setTimeout(() => {
    const h = document.getElementById('hint');
    if (h) { h.style.opacity = '0'; setTimeout(() => h.remove(), 1000); }
  }, 4000);
}

// ─── TREE BUILDER ────────────────────────────────────────────────────────────
function buildTree(people) {
  const pm = {};
  people.forEach(p => pm[p.id] = p);

  // Build links
  const links = [];
  const lset = new Set();
  function addLink(s, t, type) {
    if (!s||!t||s===t||!pm[s]||!pm[t]) return;
    const k = type+'|'+[s,t].sort().join('|');
    if (!lset.has(k)) { lset.add(k); links.push({source:s,target:t,type}); }
  }
  people.forEach(p => {
    if (p.motherId)    addLink(p.motherId, p.id, 'parent');
    if (p.fatherId)    addLink(p.fatherId, p.id, 'parent');
    if (p.partnerId)   addLink(p.id, p.partnerId, 'partner');
    p.exPartnerIds.forEach(e => addLink(p.id, e, 'partner'));
    p.extraPartnerIds.forEach(e => addLink(p.id, e, 'partner'));
  });

  // Color palette
  const PALETTE = {
    'Cross':'#60a5fa','Massarotti':'#4ade80','Vella':'#fb923c',
    'Rossi':'#f87171','Ribblett':'#c084fc','Jackson':'#38bdf8',
    'Deems':'#fbbf24','Codron':'#f472b6','Di Mascio':'#34d399',
    'Rossetti':'#a3e635','Schell':'#2dd4bf','Stalhman':'#e879f9',
    'Zepp':'#94a3b8','Pyle':'#fdba74','Bartlett':'#a78bfa',
  };
  const EXTRA = ['#ff9f43','#ee5a24','#9b59b6','#1abc9c','#3498db','#e74c3c','#f7ca18'];
  let ec = 0;
  function getColor(p) {
    const s = p.surname||'';
    if (!PALETTE[s] && s) PALETTE[s] = EXTRA[ec++ % EXTRA.length];
    return PALETTE[s]||'#94a3b8';
  }

  // Stats
  const byears = people.filter(p=>p.birthYear).map(p=>p.birthYear);
  document.getElementById('s-total').textContent  = people.length;
  document.getElementById('s-dec').textContent    = people.filter(p=>p.deceased).length;
  document.getElementById('s-oldest').textContent = byears.length ? Math.min(...byears) : '—';
  document.getElementById('s-sur').textContent    = [...new Set(people.map(p=>p.surname).filter(s=>s))].length;

  // Legend
  const surnameOrder = [...new Set(people.map(p=>p.surname).filter(s=>s))];
  surnameOrder.sort((a,b)=>people.filter(p=>p.surname===b).length-people.filter(p=>p.surname===a).length);
  const legendEl = document.getElementById('legend-items');
  surnameOrder.slice(0,14).forEach(s => {
    if (!s) return;
    const cnt = people.filter(p=>p.surname===s).length;
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${getColor({surname:s})}"></div><span>${s}</span><span class="legend-count">${cnt}</span>`;
    div.onclick = () => highlightSurname(s, node);
    legendEl.appendChild(div);
  });

  // D3 setup
  const nodes = people.map(p => ({...p}));
  const W = window.innerWidth, H = window.innerHeight - 58;
  const svg = d3.select('#svg-main');
  const g = svg.append('g');

  const zoom = d3.zoom().scaleExtent([0.04,5]).on('zoom', ev => g.attr('transform', ev.transform));
  svg.call(zoom);

  const sim = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(links).id(d=>d.id)
      .distance(d=>d.type==='partner'?32:65).strength(d=>d.type==='partner'?0.9:0.55))
    .force('charge', d3.forceManyBody().strength(-140).distanceMax(280))
    .force('center',  d3.forceCenter(W/2, H/2))
    .force('x',       d3.forceX(W/2).strength(0.02))
    .force('y',       d3.forceY(H/2).strength(0.02))
    .force('collide', d3.forceCollide(16))
    .alphaDecay(0.018);

  const link = g.append('g').selectAll('line').data(links).enter().append('line')
    .attr('class', d=>'link link-'+d.type);

  const node = g.append('g').selectAll('g').data(nodes).enter().append('g')
    .attr('class','node')
    .call(d3.drag()
      .on('start',(ev,d)=>{ if(!ev.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on('drag', (ev,d)=>{ d.fx=ev.x; d.fy=ev.y; })
      .on('end',  (ev,d)=>{ if(!ev.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on('click', (ev,d)=>{ ev.stopPropagation(); showDetail(d, pm, people, links, getColor, node, zoom, svg, W, H); })
    .on('mouseover', (ev,d)=>showTip(ev,d,getColor))
    .on('mouseout',  ()=>{ document.getElementById('tooltip').style.opacity='0'; });

  node.append('circle')
    .attr('r', d => {
      const c = links.filter(l=>l.source===d.id||l.target===d.id||l.source.id===d.id||l.target.id===d.id).length;
      return Math.max(6, Math.min(15, 6+c*0.65));
    })
    .attr('fill', d => d.deceased ? 'transparent' : getColor(d))
    .attr('stroke', d => getColor(d))
    .attr('stroke-width', 2)
    .style('color', d => getColor(d));

  node.filter(d=>d.id==='START').append('circle')
    .attr('r',4).attr('fill','#fff').attr('pointer-events','none');

  node.append('text').attr('dy',20)
    .text(d => d.name ? d.name.split(' ')[0] : '');

  sim.on('tick', () => {
    link.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y)
        .attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
    node.attr('transform', d=>`translate(${d.x},${d.y})`);
  });

  svg.on('click', () => { clearHighlight(node); closeDetail(); });

  // Controls
  let showDec = true;
  window.toggleDeceased = () => {
    showDec = !showDec;
    node.style('display', d => !showDec && d.deceased ? 'none' : null);
    document.getElementById('btn-dec').textContent = showDec ? '◌ Hide Deceased' : '● Show Deceased';
  };
  window.resetView = () => {
    svg.transition().duration(700)
      .call(zoom.transform, d3.zoomIdentity.translate(W*0.08, H*0.05).scale(0.55));
  };
  window.clearHighlight = () => clearHighlight(node);

  // Search
  document.getElementById('search-box').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) { clearHighlight(node); return; }
    const ids = new Set(people.filter(p=>p.name&&p.name.toLowerCase().includes(q)).map(p=>p.id));
    node.classed('highlighted', d=>ids.has(d.id));
    node.classed('dimmed', d=>!ids.has(d.id));
    if (ids.size===1) {
      const id = [...ids][0];
      const n = nodes.find(n=>n.id===id);
      const p = pm[id];
      if (n&&n.x) {
        svg.transition().duration(600)
          .call(zoom.transform, d3.zoomIdentity.translate(W/2-1.6*n.x, H/2-1.6*n.y).scale(1.6));
      }
      showDetail(p, pm, people, links, getColor, node, zoom, svg, W, H);
    }
  });

  // Initial zoom
  setTimeout(() => {
    svg.call(zoom.transform, d3.zoomIdentity.translate(W*0.08, H*0.05).scale(0.55));
  }, 800);

  window.addEventListener('resize', () => {
    sim.force('center', d3.forceCenter(window.innerWidth/2, (window.innerHeight-58)/2));
  });
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function clearHighlight(node) {
  if (!node) return;
  node.classed('highlighted', false).classed('dimmed', false);
}

function highlightSurname(s, node) {
  const ids = new Set();
  node.each(d => { if (d.surname===s) ids.add(d.id); });
  node.classed('highlighted', d=>ids.has(d.id));
  node.classed('dimmed', d=>!ids.has(d.id));
}

function showTip(ev, d, getColor) {
  const tip = document.getElementById('tooltip');
  let t = `<strong>${d.name}</strong>`;
  if (d.birthYear) t += `<br/>b. ${d.birthYear}`;
  if (d.deceased && d.deathYear) t += ` – ${d.deathYear}`;
  else if (d.deceased) t += ' <em>† deceased</em>';
  if (d.surname) t += `<br/><span style="color:${getColor(d)}">${d.surname}</span>`;
  tip.innerHTML = t;
  tip.style.opacity = '1';
  tip.style.left = (ev.clientX+14)+'px';
  tip.style.top  = (ev.clientY-12)+'px';
}

function showDetail(d, pm, people, links, getColor, node, zoom, svg, W, H) {
  const panel = document.getElementById('detail-panel');
  const content = document.getElementById('detail-content');
  const color = getColor(d);
  const mo = d.motherId ? pm[d.motherId] : null;
  const fa = d.fatherId ? pm[d.fatherId] : null;
  const pa = d.partnerId ? pm[d.partnerId] : null;
  const children = people.filter(p=>p.motherId===d.id||p.fatherId===d.id);
  const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  function fmtDate(y,m,dy) {
    if (!y) return null;
    let s = y+'';
    if (m) s = MONTHS[m-1]+(dy?' '+dy+',':',')+' '+y;
    return s;
  }
  function row(lbl,val) {
    return `<div class="detail-row"><span class="detail-label">${lbl}</span><span class="detail-value">${val}</span></div>`;
  }
  function lnk(p,icon) {
    return `<a class="person-link" onclick="focusPerson('${p.id}')">${icon} ${p.name}</a>`;
  }

  let html = `<h2>${d.name||'Unknown'}</h2>`;
  if (d.surname) html += `<div class="dsurname" style="color:${color}">${d.surname}</div>`;
  if (d.deceased) html += `<div class="deceased-badge">† Deceased</div>`;
  if (d.id==='START') html += `<div class="root-badge">⭐ You are here</div>`;

  const born = fmtDate(d.birthYear, d.birthMonth, d.birthDay);
  const died = fmtDate(d.deathYear);
  if (born||died||d.birthPlace||d.profession||d.gender) {
    html += `<div class="detail-section"><h3>Life</h3>`;
    if (d.gender)     html += row('Gender', d.gender);
    if (born)         html += row('Born', born+(d.birthPlace?', '+d.birthPlace:''));
    if (died)         html += row('Died', died+(d.deathPlace?', '+d.deathPlace:''));
    if (d.profession) html += row('Profession', d.profession);
    html += `</div>`;
  }
  if (mo||fa) {
    html += `<div class="detail-section"><h3>Parents</h3>`;
    if (mo) html += lnk(mo,'👩');
    if (fa) html += lnk(fa,'👨');
    html += `</div>`;
  }
  if (pa) {
    html += `<div class="detail-section"><h3>Partner</h3>`+lnk(pa,'💑')+`</div>`;
  }
  if (children.length) {
    html += `<div class="detail-section"><h3>Children (${children.length})</h3>`;
    children.forEach(c => html += lnk(c,'👶'));
    html += `</div>`;
  }
  if (d.bioNotes) {
    html += `<div class="detail-section"><h3>Notes</h3><p style="font-size:12px;line-height:1.6;color:#ccc">${d.bioNotes}</p></div>`;
  }
  content.innerHTML = html;
  panel.classList.add('open');

  // Highlight node + connections
  const connected = new Set([d.id]);
  links.forEach(l => {
    const s = typeof l.source==='object'?l.source.id:l.source;
    const t = typeof l.target==='object'?l.target.id:l.target;
    if (s===d.id) connected.add(t);
    if (t===d.id) connected.add(s);
  });
  node.classed('highlighted', n=>n.id===d.id);
  node.classed('dimmed', n=>!connected.has(n.id));

  // Store refs for focusPerson
  window._treeState = {pm, people, links, getColor, node, zoom, svg, W, H};
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
  if (window._treeState) clearHighlight(window._treeState.node);
}
window.closeDetail = closeDetail;

window.focusPerson = function(id) {
  const {pm,people,links,getColor,node,zoom,svg,W,H} = window._treeState||{};
  if (!pm||!pm[id]) return;
  showDetail(pm[id], pm, people, links, getColor, node, zoom, svg, W, H);
  const n = node.data().find(n=>n.id===id);
  if (n&&n.x) {
    svg.transition().duration(600)
      .call(zoom.transform, d3.zoomIdentity.translate(W/2-1.6*n.x, H/2-1.6*n.y).scale(1.6));
  }
};

// ─── GO ──────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
